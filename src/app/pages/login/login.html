<div class="login-container">

  <div class="login-card">

    <h2>Se connecter</h2>

    <form >

      <div class="form-group">
        <input formControlName="usernameOrEmail" type="text" placeholder="Nom d'utilisateur ou Email">
      </div>

      <div class="form-group">
        <input formControlName="mot_de_passe" type="password" placeholder="Mot de passe">
      </div>

      <button type="submit" class="login-btn">Se connecter</button>

      <p class="text-center">
        Pas de compte ? <a routerLink="/register">S'inscrire</a>
      </p>

    </form>

  </div>

</div>
